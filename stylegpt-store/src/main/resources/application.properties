spring.application.name=Bhuvi Style Store
server.port=${PORT:8080}

# Database — uses environment variable if set (for cloud), else local MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stylegpt_store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Secret — override in production via environment variable
app.jwt.secret=${JWT_SECRET:StyleGPTStoreJwtSecretKeyForLocalDevelopmentChangeThisInProduction2026}
app.jwt.expiration-ms=86400000
app.upload-dir=uploads/products

# OpenAI (optional)
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o
openai.url=https://api.openai.com/v1/responses