spring.application.name=StyleGPT Store
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/stylegpt_store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.jwt.secret=StyleGPTStoreJwtSecretKeyForLocalDevelopmentChangeThisInProduction2026
app.jwt.expiration-ms=86400000
app.upload-dir=uploads/products

openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-5.5
openai.url=https://api.openai.com/v1/responses

sms.fast2sms.enabled=true
sms.fast2sms.api-key= pifC********************