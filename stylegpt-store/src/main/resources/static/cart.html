<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | StyleGPT Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
    <div class="nav-inner">
        <a class="brand" href="index.html">StyleGPT Store</a>
        <div class="nav-links">
            <a href="orders.html">Orders</a>
            <button class="secondary" data-logout>Logout</button>
        </div>
    </div>
</nav>
<main class="container two-col">
    <section class="panel">
        <h2>Your cart</h2>
        <div id="cartItems"></div>
        <h3>Total: <span id="cartTotal">₹0</span></h3>
    </section>
    <section class="panel">
        <h2>Checkout</h2>
        <form id="checkoutForm" class="form-grid">
            <input name="customerName" placeholder="Full name" required>
            <input name="phone" placeholder="Phone number" required>
            <textarea name="address" placeholder="Address" required></textarea>
            <input name="city" placeholder="City" required>
            <input name="state" placeholder="State" required>
            <input name="pincode" placeholder="Pincode" required>
            <button>Place COD order</button>
        </form>
    </section>
</main>
<button class="floating-theme" type="button" title="Dark mode" aria-label="Dark mode" data-dark></button>
<script src="js/app.js"></script>
</body>
</html>
