<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | StyleGPT Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
    <div class="nav-inner">
        <a class="brand" href="index.html">StyleGPT Store Admin</a>
        <div class="nav-links">
            <a href="index.html">Store</a>
            <button class="secondary" data-logout>Logout</button>
        </div>
    </div>
</nav>
<main class="container">
    <h1>Admin panel</h1>
    <section class="admin-grid">
        <form id="productForm" class="panel form-grid">
            <h2>Product management</h2>
            <input type="hidden" name="productId">
            <input name="name" placeholder="Product name" required>
            <textarea name="description" placeholder="Description" required></textarea>
            <input name="category" placeholder="Category" required>
            <input name="brand" placeholder="Brand" required>
            <input name="color" placeholder="Color" required>
            <input name="sizeOptions" placeholder="Sizes e.g. S,M,L" required>
            <input name="price" type="number" min="0" step="0.01" placeholder="Price" required>
            <input name="stock" type="number" min="0" placeholder="Stock" required>
            <input name="imageUrl" placeholder="Image URL, or upload after saving">
            <label><input name="active" type="checkbox" checked style="width:auto"> Active</label>
            <button>Save product</button>
            <button type="button" class="secondary" id="resetProduct">New product</button>
        </form>
        <section class="panel">
            <h2>Products</h2>
            <div id="adminProducts"></div>
        </section>
    </section>
    <section class="two-col" style="margin-top:18px">
        <div class="panel">
            <h2>Orders</h2>
            <button id="loadOrders">View orders</button>
            <div id="adminOrders" class="form-grid" style="margin-top:12px"></div>
        </div>
        <div class="panel">
            <h2>Users</h2>
            <button id="loadUsers">View users</button>
            <div id="adminUsers" class="form-grid" style="margin-top:12px"></div>
        </div>
    </section>
</main>
<button class="floating-theme" type="button" title="Dark mode" aria-label="Dark mode" data-dark></button>
<script src="js/app.js"></script>
</body>
</html>
