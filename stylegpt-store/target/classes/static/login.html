<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bhuvi Style</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="auth-shell">
    <section class="panel auth-box">
        <h1 class="brand">Bhuvi Style</h1>
        <h2>Welcome back</h2>
        <form id="loginForm" class="form-grid">
            <input name="email" type="email" placeholder="Email address" required>
            <input name="password" type="password" placeholder="Password" minlength="6" required>
            <button>Login</button>
        </form>
        <p>New here? <a href="register.html">Create account</a></p>
    </section>
</main>
<button class="floating-theme" type="button" title="Dark mode" aria-label="Dark mode" data-dark></button>
<script src="js/app.js"></script>
</body>
</html>
