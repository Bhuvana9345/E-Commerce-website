<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | StyleGPT Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="auth-shell">
    <section class="panel auth-box">
        <h1 class="brand">StyleGPT Store</h1>
        <h2>Create account</h2>
        <form id="registerForm" class="form-grid">
            <input name="name" placeholder="Full name" required>
            <input name="phone" placeholder="Phone number" required>
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" minlength="6" required>
            <button>Register and continue</button>
        </form>
        <p>Already registered? <a href="login.html">Login</a></p>
    </section>
</main>
<button class="floating-theme" type="button" title="Dark mode" aria-label="Dark mode" data-dark></button>
<script src="js/app.js"></script>
</body>
</html>
